  var overlay = document.getElementById('dots-menu-overlay');
  if (!overlay) return;

  dotsBtn.style.cursor = 'pointer';
  dotsBtn.style.position = 'relative';
  dotsBtn.style.zIndex = '9998';

  function positionOverlay() {
    var r = dotsBtn.getBoundingClientRect();
    var zoom = parseFloat(document.body.style.zoom) || 1;
    overlay.style.top = ((r.bottom / zoom) + 8) + 'px';
    overlay.style.right = ((window.innerWidth / zoom - r.right / zoom)) + 'px';
    overlay.style.left = 'auto';
  }

  // Use capturing phase to ensure we get the click even if children intercept
  dotsBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    overlay.classList.toggle('open');
    if (overlay.classList.contains('open')) positionOverlay();
  }, true);

  document.addEventListener('click', function(e) {
    if (!overlay.contains(e.target) && e.target !== dotsBtn && !dotsBtn.contains(e.target)) {
      overlay.classList.remove('open');
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') overlay.classList.remove('open');
  });

  window.addEventListener('resize', function() {
    if (overlay.classList.contains('open')) positionOverlay();
  });
})();
</script></body></html>
