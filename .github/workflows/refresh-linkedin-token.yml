name: Refresh LinkedIn Access Token

on:
  schedule:
    - cron: '0 9 1 * *'  # 9am on the 1st of every month
  workflow_dispatch:      # allow manual trigger from Actions tab

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange refresh token for new access token
        env:
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ vars.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          set -e

          RESPONSE=$(curl -s -X POST "https://www.linkedin.com/oauth/v2/accessToken" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token&refresh_token=${LINKEDIN_REFRESH_TOKEN}&client_id=${LINKEDIN_CLIENT_ID}&client_secret=${LINKEDIN_CLIENT_SECRET}")

          NEW_ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          NEW_REFRESH_TOKEN=$(echo "$RESPONSE" | jq -r '.refresh_token // empty')
          EXPIRES_IN=$(echo "$RESPONSE" | jq -r '.expires_in // empty')

          if [ -z "$NEW_ACCESS_TOKEN" ]; then
            echo "ERROR: Failed to refresh LinkedIn access token."
            echo "Response: $RESPONSE"
            echo ""
            echo "The refresh token may have expired (valid for 12 months)."
            echo "Go to https://www.linkedin.com/developers/tools/oauth to generate new tokens manually,"
            echo "then update LINKEDIN_ACCESS_TOKEN and LINKEDIN_REFRESH_TOKEN in repo secrets."
            exit 1
          fi

          echo "$NEW_ACCESS_TOKEN" | gh secret set LINKEDIN_ACCESS_TOKEN \
            --repo actionresearchprojects/actionresearchprojects.github.io

          if [ -n "$NEW_REFRESH_TOKEN" ]; then
            echo "$NEW_REFRESH_TOKEN" | gh secret set LINKEDIN_REFRESH_TOKEN \
              --repo actionresearchprojects/actionresearchprojects.github.io
          fi

          echo "LinkedIn access token refreshed successfully."
          echo "New token expires in: ${EXPIRES_IN} seconds (~$((EXPIRES_IN / 86400)) days)"
