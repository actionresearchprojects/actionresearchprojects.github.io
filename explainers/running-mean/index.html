<script>
(function(){
  if(sessionStorage.getItem('arc_auth')==='1')return;
  var s=document.createElement('style');
  s.textContent='body{visibility:hidden}';
  document.head.appendChild(s);
  document.addEventListener('DOMContentLoaded',function(){
    s.remove();
    var o=document.createElement('div');
    o.style.cssText='position:fixed;inset:0;z-index:99999;background:#111;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#fff;';
    o.innerHTML='<div style="text-align:center"><div style="font-size:20px;margin-bottom:20px;font-weight:500">Enter password</div><input id="pw-in" type="password" placeholder="Password" style="padding:10px 14px;font-size:16px;background:#222;color:#fff;border:1px solid #555;border-radius:4px;width:220px;outline:none;display:block;margin:0 auto 8px"><div id="pw-err" style="color:#f66;font-size:13px;height:20px"></div><button id="pw-btn" style="padding:10px 28px;background:#fff;color:#111;border:none;border-radius:4px;font-size:15px;cursor:pointer;margin-top:4px">Enter</button></div>';
    document.body.appendChild(o);
    document.getElementById('pw-in').focus();
    async function check(){
      var val=document.getElementById('pw-in').value;
      var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
      var hash=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
      if(hash==='PLACEHOLDER_HASH'){
        sessionStorage.setItem('arc_auth','1');
        o.remove();
      }else{
        document.getElementById('pw-err').textContent='Incorrect password';
      }
    }
    document.getElementById('pw-btn').addEventListener('click',check);
    document.getElementById('pw-in').addEventListener('keydown',function(e){if(e.key==='Enter')check();});
  });
})();
</script>
