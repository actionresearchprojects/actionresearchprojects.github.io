<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARC Admin — New Post</title>
  <link rel="icon" type="image/png" sizes="any" href="../assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Ubuntu', sans-serif;
      color: #e0e0e0;
      min-height: 100vh;
      background: #0d0d0d;
    }

    .page-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      object-fit: cover;
      object-position: center;
      opacity: 0.4;
    }

    /* ── Login ── */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .login-box {
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
    }

    .login-logo {
      height: 36px;
      width: auto;
      margin-bottom: 28px;
      display: block;
    }

    .login-box h1 {
      font-size: 24px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 8px;
    }

    .login-box > p {
      font-size: 14px;
      color: #777;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .login-box label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-box input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-box input[type="password"]:focus {
      border-color: rgba(255,255,255,0.25);
    }

    .login-help {
      font-size: 12px;
      color: #555;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .login-help a { color: #6daadb; text-decoration: none; }
    .login-help a:hover { text-decoration: underline; }

    .login-help code {
      background: rgba(255,255,255,0.06);
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 11px;
      color: #aaa;
    }

    .login-error {
      color: #e74c3c;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: #fff;
      color: #111;
      width: 100%;
    }
    .btn-primary:hover:not(:disabled) { background: #e8e8e8; }

    .btn-publish {
      background: #0a66c2;
      color: #fff;
      padding: 12px 32px;
    }
    .btn-publish:hover:not(:disabled) { background: #095aa8; }

    .btn-ghost {
      background: transparent;
      color: #999;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 16px;
      font-size: 13px;
    }
    .btn-ghost:hover:not(:disabled) { border-color: rgba(255,255,255,0.25); color: #fff; }

    /* ── Editor layout ── */
    .editor-screen {
      display: none;
      position: relative;
      z-index: 1;
    }

    .editor-header {
      background: rgba(13, 13, 13, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 28px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .editor-header-left img {
      height: 24px;
      width: auto;
    }

    .editor-header-left span {
      font-size: 14px;
      color: #666;
      font-weight: 400;
    }

    .editor-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-badge {
      font-size: 12px;
      color: #555;
      margin-right: 4px;
    }

    .editor-body {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Form fields ── */
    .field { margin-bottom: 28px; }

    .field label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .field input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input[type="text"]:focus {
      border-color: rgba(255,255,255,0.2);
    }

    .title-input {
      font-size: 28px !important;
      font-weight: 600;
      border: none !important;
      background: transparent !important;
      padding: 0 !important;
      margin-bottom: 8px;
    }

    .title-input::placeholder { color: #444; }

    /* ── Author row ── */
    .author-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }
    .author-row .field { flex: 1; margin-bottom: 0; }

    /* ── Toolbar + editor ── */
    .toolbar {
      display: flex;
      gap: 2px;
      padding: 6px 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      flex-wrap: wrap;
    }

    .toolbar button {
      background: transparent;
      border: none;
      color: #777;
      width: 32px;
      height: 32px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.1s;
    }

    .toolbar button:hover { background: rgba(255,255,255,0.08); color: #ddd; }

    .toolbar .sep {
      width: 1px;
      background: rgba(255,255,255,0.08);
      margin: 4px 6px;
    }

    .editor-area {
      min-height: 280px;
      padding: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0 0 8px 8px;
      color: #d4d4d4;
      font-size: 15px;
      line-height: 1.75;
      outline: none;
      transition: border-color 0.2s;
    }

    .editor-area:focus { border-color: rgba(255,255,255,0.18); }

    .editor-area h2 { font-size: 20px; color: #fff; margin: 16px 0 8px; }
    .editor-area h3 { font-size: 17px; color: #fff; margin: 12px 0 6px; }
    .editor-area p { margin-bottom: 10px; }
    .editor-area a { color: #6daadb; }
    .editor-area img { max-width: 100%; border-radius: 6px; margin: 8px 0; }
    .editor-area blockquote {
      border-left: 2px solid rgba(255,255,255,0.15);
      padding-left: 14px;
      color: #999;
      font-style: italic;
      margin: 12px 0;
    }
    .editor-area ul, .editor-area ol { margin: 0 0 12px 20px; }

    .editor-area[data-placeholder]:empty::before {
      content: attr(data-placeholder);
      color: #444;
      pointer-events: none;
    }

    /* ── Images ── */
    .image-drop-zone {
      border: 1px dashed rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 28px;
      text-align: center;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .image-drop-zone:hover, .image-drop-zone.dragover {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.02);
      color: #888;
    }

    .image-drop-zone input[type="file"] { display: none; }

    .image-previews {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .image-preview-item {
      position: relative;
      width: 100px;
      height: 75px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .image-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-preview-item .remove-img {
      position: absolute;
      top: 3px; right: 3px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px; height: 20px;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-preview-item .set-cover {
      position: absolute;
      bottom: 3px; left: 3px;
      background: rgba(0,0,0,0.75);
      color: #888;
      border: none;
      border-radius: 3px;
      padding: 1px 5px;
      cursor: pointer;
      font-size: 9px;
      font-family: inherit;
    }
    .image-preview-item .set-cover:hover { color: #fff; }
    .image-preview-item.is-cover { border-color: #0a66c2; }
    .image-preview-item.is-cover .set-cover { color: #6daadb; }

    /* ── Tags ── */
    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      min-height: 40px;
      align-items: center;
      cursor: text;
      transition: border-color 0.2s;
    }

    .tags-container:focus-within { border-color: rgba(255,255,255,0.2); }

    .tag-pill {
      background: rgba(255,255,255,0.08);
      color: #bbb;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tag-pill button {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      line-height: 1;
    }
    .tag-pill button:hover { color: #fff; }

    .tags-input {
      border: none;
      background: transparent;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      flex: 1;
      min-width: 80px;
    }
    .tags-input::placeholder { color: #444; }

    /* ── Publish section ── */
    .publish-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 24px;
      margin-top: 36px;
    }

    .publish-section h3 {
      font-size: 14px;
      font-weight: 500;
      color: #ccc;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      color: #bbb;
    }

    .check-row input[type="checkbox"] {
      accent-color: #0a66c2;
      width: 16px;
      height: 16px;
    }

    .publish-note {
      font-size: 12px;
      color: #555;
      margin: 4px 0 20px 26px;
      line-height: 1.5;
    }

    .publish-note a { color: #6daadb; text-decoration: none; }

    .publish-actions {
      display: flex;
      gap: 12px;
      padding-top: 4px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(13, 13, 13, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      display: none;
      max-width: 360px;
    }
    .toast.error { border-color: rgba(231,76,60,0.4); color: #ff6b6b; }
    .toast.success { border-color: rgba(40,167,69,0.3); }

    /* ── Preview overlay ── */
    .preview-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      overflow-y: auto;
    }

    .preview-content {
      max-width: 680px;
      margin: 48px auto;
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 40px;
    }

    .preview-close {
      position: fixed;
      top: 16px; right: 16px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 18px;
      cursor: pointer;
      z-index: 201;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-close:hover { background: rgba(255,255,255,0.2); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .login-box { padding: 32px 24px; }
      .editor-body { padding: 32px 16px 60px; }
      .title-input { font-size: 22px !important; }
      .author-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <img class="page-bg" src="../assets/images/support-page-background.webp" alt="">

  <!-- LOGIN -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <img class="login-logo" src="../assets/images/arc-logo.png" alt="ARC">
      <h1>Admin</h1>
      <p>Sign in with your GitHub token to create and publish posts.</p>
      <label for="pat-input">Personal Access Token</label>
      <input type="password" id="pat-input" placeholder="ghp_xxxx or github_pat_xxxx">
      <div class="login-help">
        Create at <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">github.com/settings/tokens</a><br>
        Repo: <code>actionresearchprojects.github.io</code> &rarr; Contents: Read &amp; write
      </div>
      <p class="login-error" id="login-error"></p>
      <button class="btn btn-primary" id="login-btn" onclick="login()">Sign in</button>
    </div>
  </div>

  <!-- EDITOR -->
  <div id="editor-screen" class="editor-screen">
    <div class="editor-header">
      <div class="editor-header-left">
        <img src="../assets/images/arc-logo.png" alt="ARC">
        <span>New Post</span>
      </div>
      <div class="editor-header-right">
        <span class="user-badge" id="user-badge"></span>
        <button class="btn btn-ghost" onclick="previewPost()">Preview</button>
        <button class="btn btn-ghost" onclick="logout()">Log out</button>
      </div>
    </div>

    <div class="editor-body">
      <div class="field">
        <input type="text" class="title-input" id="post-title" placeholder="Post title...">
      </div>

      <div class="author-row">
        <div class="field">
          <label>Author</label>
          <input type="text" id="post-author" placeholder="ARC Team">
        </div>
        <div class="field">
          <label>Author image URL</label>
          <input type="text" id="post-author-image" placeholder="https://...">
        </div>
      </div>

      <div class="field">
        <label>Images</label>
        <div class="image-drop-zone" id="image-drop-zone">
          <input type="file" id="image-input" multiple accept="image/*">
          Click or drop images here
        </div>
        <div class="image-previews" id="image-previews"></div>
      </div>

      <div class="field">
        <label>Content</label>
        <div class="toolbar">
          <button onclick="formatDoc('bold')" title="Bold"><b>B</b></button>
          <button onclick="formatDoc('italic')" title="Italic"><i>I</i></button>
          <button onclick="formatDoc('underline')" title="Underline"><u>U</u></button>
          <div class="sep"></div>
          <button onclick="formatBlock('h2')" title="Heading 2">H2</button>
          <button onclick="formatBlock('h3')" title="Heading 3">H3</button>
          <button onclick="formatBlock('p')" title="Paragraph">P</button>
          <div class="sep"></div>
          <button onclick="formatDoc('insertUnorderedList')" title="Bullet list">&#8226;</button>
          <button onclick="formatDoc('insertOrderedList')" title="Numbered list">1.</button>
          <button onclick="formatDoc('formatBlock', 'blockquote')" title="Quote">&ldquo;</button>
          <div class="sep"></div>
          <button onclick="insertLink()" title="Link">&#128279;</button>
          <button onclick="insertImageInline()" title="Image">&#128247;</button>
        </div>
        <div class="editor-area" id="editor-area" contenteditable="true"
             data-placeholder="Write your post..."></div>
      </div>

      <div class="field">
        <label>Tags</label>
        <div class="tags-container" id="tags-container" onclick="document.getElementById('tags-input').focus()">
          <input type="text" class="tags-input" id="tags-input"
                 placeholder="Type a tag and press Enter"
                 onkeydown="handleTagKey(event)">
        </div>
      </div>

      <div class="publish-section">
        <h3>Publish</h3>
        <div class="check-row">
          <input type="checkbox" id="publish-blog" checked>
          <label for="publish-blog">Post to blog</label>
        </div>
        <div class="check-row">
          <input type="checkbox" id="publish-linkedin" checked>
          <label for="publish-linkedin">Cross-post to LinkedIn</label>
        </div>
        <p class="publish-note">Requires <code style="background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:3px;font-size:11px;">LINKEDIN_ACCESS_TOKEN</code> secret in GitHub repo settings.</p>
        <div class="publish-actions">
          <button class="btn btn-publish" id="publish-btn" onclick="publishPost()">Publish</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-overlay" id="preview-overlay">
    <button class="preview-close" onclick="closePreview()">&times;</button>
    <div class="preview-content" id="preview-content"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let githubToken = '';
    let githubUser = '';
    let images = [];
    let coverIndex = 0;
    let tags = [];

    const REPO_OWNER = 'actionresearchprojects';
    const REPO_NAME = 'actionresearchprojects.github.io';
    const BRANCH = 'main';

    // --- Login ---
    async function login() {
      const pat = document.getElementById('pat-input').value.trim();
      if (!pat) return;

      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      err.style.display = 'none';

      try {
        const res = await fetch('https://api.github.com/user', {
          headers: { 'Authorization': `Bearer ${pat}` }
        });
        if (!res.ok) throw new Error('Invalid token');
        const user = await res.json();

        const repoRes = await fetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`,
          { headers: { 'Authorization': `Bearer ${pat}` } }
        );
        if (!repoRes.ok) throw new Error('Cannot access repository');
        const repo = await repoRes.json();
        if (!repo.permissions || !repo.permissions.push) {
          throw new Error('You do not have write access to this repository');
        }

        githubToken = pat;
        githubUser = user.login;
        localStorage.setItem('arc_admin_pat', pat);

        document.getElementById('user-badge').textContent = user.login;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('editor-screen').style.display = 'block';
        document.getElementById('post-author').value = user.name || user.login;
        document.getElementById('post-author-image').value = user.avatar_url || '';
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }

    function logout() {
      githubToken = '';
      githubUser = '';
      localStorage.removeItem('arc_admin_pat');
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('editor-screen').style.display = 'none';
    }

    (function() {
      const saved = localStorage.getItem('arc_admin_pat');
      if (saved) {
        document.getElementById('pat-input').value = saved;
        login();
      }
    })();

    // --- Editor ---
    function formatDoc(cmd, value) {
      document.execCommand(cmd, false, value || null);
      document.getElementById('editor-area').focus();
    }

    function formatBlock(tag) {
      document.execCommand('formatBlock', false, '<' + tag + '>');
      document.getElementById('editor-area').focus();
    }

    function insertLink() {
      const url = prompt('Enter URL:');
      if (url) document.execCommand('createLink', false, url);
    }

    function insertImageInline() {
      const url = prompt('Enter image URL:');
      if (url) document.execCommand('insertImage', false, url);
    }

    // --- Images ---
    const dropZone = document.getElementById('image-drop-zone');
    const imageInput = document.getElementById('image-input');

    dropZone.addEventListener('click', () => imageInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
    imageInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          images.push({ file, dataUrl: e.target.result, uploaded: false, path: '' });
          renderImagePreviews();
        };
        reader.readAsDataURL(file);
      });
    }

    function renderImagePreviews() {
      document.getElementById('image-previews').innerHTML = images.map((img, i) => `
        <div class="image-preview-item ${i === coverIndex ? 'is-cover' : ''}">
          <img src="${img.dataUrl}" alt="">
          <button class="remove-img" onclick="removeImage(${i})">&times;</button>
          <button class="set-cover" onclick="setCover(${i})">${i === coverIndex ? 'Cover' : 'Set cover'}</button>
        </div>
      `).join('');
    }

    function removeImage(i) {
      images.splice(i, 1);
      if (coverIndex >= images.length) coverIndex = Math.max(0, images.length - 1);
      renderImagePreviews();
    }

    function setCover(i) { coverIndex = i; renderImagePreviews(); }

    // --- Tags ---
    function handleTagKey(e) {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const tag = e.target.value.trim().replace(/,/g, '');
        if (tag && !tags.includes(tag)) { tags.push(tag); renderTags(); }
        e.target.value = '';
      } else if (e.key === 'Backspace' && !e.target.value && tags.length) {
        tags.pop();
        renderTags();
      }
    }

    function renderTags() {
      const container = document.getElementById('tags-container');
      const input = document.getElementById('tags-input');
      container.innerHTML = tags.map((tag, i) => `
        <span class="tag-pill">${escHtml(tag)}<button onclick="removeTag(${i})">&times;</button></span>
      `).join('');
      container.appendChild(input);
    }

    function removeTag(i) { tags.splice(i, 1); renderTags(); }

    // --- Preview ---
    function previewPost() {
      const title = document.getElementById('post-title').value || 'Untitled';
      const author = document.getElementById('post-author').value || 'ARC';
      const body = document.getElementById('editor-area').innerHTML;
      const coverImg = images.length > 0 ? images[coverIndex].dataUrl : '';
      const date = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

      document.getElementById('preview-content').innerHTML = `
        <p style="color:#777;font-size:14px;margin-bottom:8px;">${escHtml(author)} &middot; ${date}</p>
        <h1 style="color:#fff;font-size:26px;font-weight:600;margin-bottom:20px;line-height:1.3;">${escHtml(title)}</h1>
        ${coverImg ? `<img src="${coverImg}" style="width:100%;border-radius:8px;margin-bottom:24px;max-height:400px;object-fit:cover;">` : ''}
        <div style="color:#d0d0d0;font-size:15px;line-height:1.8;">${body}</div>
      `;
      document.getElementById('preview-overlay').style.display = 'block';
    }

    function closePreview() { document.getElementById('preview-overlay').style.display = 'none'; }

    // --- Publishing ---
    async function publishPost() {
      const title = document.getElementById('post-title').value.trim();
      if (!title) { showToast('Please enter a title', true); return; }
      const body = document.getElementById('editor-area').innerHTML.trim();
      if (!body) { showToast('Please write some content', true); return; }

      const btn = document.getElementById('publish-btn');
      btn.disabled = true;
      btn.textContent = 'Publishing...';

      try {
        const slug = slugify(title);
        const now = new Date().toISOString();
        const author = document.getElementById('post-author').value || 'ARC';
        const authorImage = document.getElementById('post-author-image').value || '';
        const publishToLinkedIn = document.getElementById('publish-linkedin').checked;

        showToast('Uploading images...');
        const uploadedImagePaths = [];
        for (let i = 0; i < images.length; i++) {
          const img = images[i];
          if (!img.uploaded) {
            const ext = img.file.name.split('.').pop().toLowerCase();
            const imgName = `${slug}-${i + 1}.${ext}`;
            const imgPath = `blog/images/${imgName}`;
            const base64 = img.dataUrl.split(',')[1];
            await githubCreateFile(imgPath, base64, `Add blog image: ${imgName}`, true);
            img.uploaded = true;
            img.path = imgPath;
          }
          uploadedImagePaths.push(img.path);
        }

        const coverImage = uploadedImagePaths.length > 0 ? uploadedImagePaths[coverIndex] : '';

        const postData = {
          slug, title, author, authorImage, date: now, body,
          excerpt: stripHtml(body).substring(0, 200),
          coverImage: coverImage ? `/blog/${coverImage.replace('blog/', '')}` : '',
          images: uploadedImagePaths.map(p => `/blog/${p.replace('blog/', '')}`),
          tags,
          linkedinRequested: publishToLinkedIn
        };

        showToast('Saving post...');
        const postJson = JSON.stringify(postData, null, 2);
        await githubCreateFile(
          `blog/posts/${slug}.json`,
          btoa(unescape(encodeURIComponent(postJson))),
          `Add blog post: ${title}`, true
        );

        showToast('Updating blog index...');
        const manifestEntry = { ...postData };

        let manifest = [];
        try {
          const existingRes = await fetch(
            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/blog/posts.json`,
            { headers: { 'Authorization': `Bearer ${githubToken}` } }
          );
          if (existingRes.ok) {
            const existingData = await existingRes.json();
            manifest = JSON.parse(decodeURIComponent(escape(atob(existingData.content.replace(/\n/g, '')))));
          }
        } catch (e) {}

        const existingIdx = manifest.findIndex(p => p.slug === slug);
        if (existingIdx !== -1) manifest[existingIdx] = manifestEntry;
        else manifest.unshift(manifestEntry);

        await githubUpdateFile(
          'blog/posts.json',
          btoa(unescape(encodeURIComponent(JSON.stringify(manifest, null, 2)))),
          `Update blog manifest: add "${title}"`
        );

        showToast('Published! Site updates in ~1-2 minutes.', false, 5000);

        document.getElementById('post-title').value = '';
        document.getElementById('editor-area').innerHTML = '';
        images = [];
        tags = [];
        coverIndex = 0;
        renderImagePreviews();
        renderTags();
      } catch (e) {
        showToast('Error: ' + e.message, true, 6000);
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Publish';
      }
    }

    // --- GitHub API ---
    async function githubCreateFile(path, contentBase64, message) {
      let sha;
      try {
        const check = await fetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
          { headers: { 'Authorization': `Bearer ${githubToken}` } }
        );
        if (check.ok) sha = (await check.json()).sha;
      } catch (e) {}

      const body = { message, content: contentBase64, branch: BRANCH };
      if (sha) body.sha = sha;

      const res = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
        {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${githubToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }
      );
      if (!res.ok) throw new Error(`Failed to create ${path}: ${(await res.json()).message}`);
      return res.json();
    }

    async function githubUpdateFile(path, contentBase64, message) {
      const check = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
        { headers: { 'Authorization': `Bearer ${githubToken}` } }
      );
      let sha;
      if (check.ok) sha = (await check.json()).sha;

      const body = { message, content: contentBase64, branch: BRANCH };
      if (sha) body.sha = sha;

      const res = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
        {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${githubToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }
      );
      if (!res.ok) throw new Error(`Failed to update ${path}: ${(await res.json()).message}`);
      return res.json();
    }

    // --- Utilities ---
    function slugify(text) {
      return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(/^-+|-+$/g, '').substring(0, 60);
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function stripHtml(html) {
      const d = document.createElement('div');
      d.innerHTML = html;
      return d.textContent || '';
    }

    function showToast(msg, isError, duration) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : ' success');
      t.style.display = 'block';
      clearTimeout(t._to);
      t._to = setTimeout(() => t.style.display = 'none', duration || 3000);
    }

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePreview(); });
    document.getElementById('pat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
  </script>
</body>
